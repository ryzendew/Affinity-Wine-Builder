version: 2.1

executors:
  wine-builder:
    machine:
      image: ubuntu-2404:current
    resource_class: large
    environment:
      BUILD_THREADS: 4

jobs:
  build-wine:
    executor: wine-builder
    steps:
      - checkout

      - restore_cache:
          keys:
            - wine-source-v1-{{ .Branch }}
            - wine-source-v1

      - run:
          name: Install build dependencies
          command: |
            sudo apt-get update -qq
            sudo apt-get install -y -qq --no-install-recommends \
              build-essential flex bison autoconf xorg-dev \
              libfreetype-dev libfontconfig-dev libx11-dev libxext-dev \
              libgl1-mesa-dev libglu1-mesa-dev libosmesa6-dev \
              libwayland-dev wayland-protocols libxkbcommon-dev \
              libpulse-dev libgstreamer1.0-dev \
              libgstreamer-plugins-base1.0-dev libcups2-dev \
              libsane-dev libvulkan-dev mesa-common-dev \
              ocl-icd-opencl-dev opencl-headers \
              g++-mingw-w64-i686 g++-mingw-w64-x86-64 \
              binutils-mingw-w64-i686 binutils-mingw-w64-x86-64 \
              libudev-dev libdbus-1-dev libunwind-dev

      - run:
          name: Build Wine 11.11
          command: |
            ./Build-Wine-11.11.sh
          no_output_timeout: 2h

      - save_cache:
          key: wine-source-v1-{{ .Branch }}
          paths:
            - wine-11.11/

      - store_artifacts:
          path: ElementalWarrior-wine-11.11.tar.xz
          destination: /

workflows:
  version: 2.1
  build:
    jobs:
      - build-wine
